<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head (titulo)">
    <meta charset="UTF-8"/>
    <title th:text="${titulo}"></title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<div th:fragment="javascript">
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/popper.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
</div>

<!-- NAVBAR COMÚN -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" th:href="@{/about}">ToDoList</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarContent"
            aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div id="navbarContent" class="collapse navbar-collapse">
        <ul class="navbar-nav mr-auto">
            <!-- Enlace Tareas solo si está logeado -->
            <li class="nav-item" th:if="${logeado}">
                <a class="nav-link"
                   th:href="@{/usuarios/{id}/tareas(id=${usuarioSesion.id})}">Tareas</a>
            </li>

            <!-- Enlace Equipos solo si está logeado -->
            <li class="nav-item" th:if="${logeado}">
                <a class="nav-link" th:href="@{/equipos}">Equipos</a>
            </li>
        </ul>

        <ul class="navbar-nav ml-auto">
            <!-- Si NO está logeado: mostrar Login/Registro -->
            <li class="nav-item" th:if="${!logeado}">
                <a class="nav-link" th:href="@{/login}">Login</a>
            </li>
            <li class="nav-item" th:if="${!logeado}">
                <a class="nav-link" th:href="@{/registro}">Registro</a>
            </li>

            <!-- Si está logeado: menú de usuario -->
            <li class="nav-item dropdown" th:if="${logeado}">
                <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                   data-toggle="dropdown" aria-haspopup="true" aria-expanded="false"
                   th:text="${usuarioSesion.nombre}">Usuario</a>
                <div class="dropdown-menu dropdown-menu-right" aria-labelledby="userDropdown">
                    <a class="dropdown-item" th:href="@{/perfil}">Cuenta</a>
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" th:href="@{/logout}"
                       th:text="'Cerrar sesión ' + ${usuarioSesion.nombre}">Cerrar sesión</a>
                </div>
            </li>
        </ul>
    </div>
</nav>

</html>
