<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head (titulo='Descripción usuario')"></head>
<body>
<div th:replace="fragments :: navbar"></div>

<div class="container mt-3" th:object="${usuario}">
    <h2>Descripción de usuario</h2>

    <dl class="row mt-3">
        <dt class="col-sm-3">ID</dt>
        <dd class="col-sm-9" th:text="*{id}"></dd>

        <dt class="col-sm-3">Nombre</dt>
        <dd class="col-sm-9" th:text="*{nombre}"></dd>

        <dt class="col-sm-3">Email</dt>
        <dd class="col-sm-9" th:text="*{email}"></dd>

        <dt class="col-sm-3">Fecha de nacimiento</dt>
        <dd class="col-sm-9"
            th:text="${usuario.fechaNacimiento != null} ? ${#dates.format(usuario.fechaNacimiento, 'dd/MM/yyyy')} : '—'"></dd>
    </dl>

    <a class="btn btn-secondary" th:href="@{/registrados}">Volver</a>
</div>

<div th:replace="fragments::javascript"></div>
</body>
</html>
