<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head (titulo='Usuarios')"></head>
<body>
<div th:replace="fragments :: navbar"></div>

<div class="container mt-3">
    <h2>Listado de usuarios</h2>

    <div th:if="${mensaje}" class="alert alert-info mt-3" th:text="${mensaje}"></div>

    <table class="table table-striped table-bordered mt-3">
        <thead class="thead-light">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Estado</th>
            <th style="width: 220px;">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${usuarios}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.nombre}"></td>
            <td th:text="${u.email}"></td>

            <!-- Estado -->
            <td>
                <span th:text="${u.bloqueado} ? 'Bloqueado' : 'Activo'"></span>
            </td>

            <!-- Acciones -->
            <td class="d-flex gap-2">
                <a class="btn btn-sm btn-primary mr-2" th:href="@{/registrados/{id}(id=${u.id})}">Ver</a>

                <!-- Botón Bloquear / Habilitar -->
                <form th:action="@{/registrados/{id}/bloqueo(id=${u.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm"
                            th:classappend="${u.bloqueado} ? 'btn-success' : 'btn-danger'"
                            th:text="${u.bloqueado} ? 'Habilitar' : 'Bloquear'">
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:replace="fragments::javascript"></div>
</body>
</html>
